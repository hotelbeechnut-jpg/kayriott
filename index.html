<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayriott Hotel & Suites — Luxury in Effurun-Warri</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Outfit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold:#C9A84C; --gold-light:#E8C97A; --dark:#0D0D0D; --white:#fff;
            --serif:'Cormorant Garamond',serif; --sans:'Outfit',sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--sans); background:var(--dark); color:#F7F4EF; overflow-x:hidden; }

        /* NAVIGATION */
        nav { 
            position:fixed; top:0; width:100%; z-index:200; display:flex; 
            justify-content:space-between; align-items:center; padding:1.2rem 1.5rem;
            background:rgba(0,0,0,0.8); transition:0.4s;
        }
        @media(min-width: 960px) { nav { padding:1.5rem 5rem; background:transparent; } }
        nav.scrolled { background:rgba(8,8,8,0.98); padding:1rem 5rem; }
        .brand { font-family:var(--serif); color:var(--gold); font-size:1.5rem; text-transform:uppercase; letter-spacing:2px; }

        /* DYNAMIC HERO SECTION */
        #hero { position:relative; height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#000; }
        
        .hero-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; opacity:0.5; }
        
        /* Building image that fades in/out for movement */
        .hero-slide {
            position:absolute; inset:0; width:100%; height:100%;
            background-size:cover; background-position:center;
            z-index:1; opacity:0; transition:opacity 2s ease-in-out;
            transform:scale(1.1); animation:kenburns 20s infinite alternate;
        }
        .hero-slide.active { opacity:0.4; }

        @keyframes kenburns { from { transform:scale(1); } to { transform:scale(1.1); } }

        .hero-content { position:relative; z-index:10; text-align:center; padding:0 1.5rem; }
        .h-title { font-family:var(--serif); font-size:clamp(2.5rem, 8vw, 5rem); line-height:1.1; color:var(--white); }
        .h-title em { color:var(--gold-light); font-style:italic; }

        /* MOBILE RESPONSIVE GRIDS */
        .sec { padding:4rem 1.5rem; }
        @media(min-width: 960px) { .sec { padding:7rem 5rem; } }

        .grid-2 { display:grid; grid-template-columns:1fr; gap:2rem; }
        @media(min-width: 960px) { .grid-2 { grid-template-columns:1fr 1fr; } }

        .rooms-grid { display:grid; grid-template-columns:1fr; gap:1rem; }
        @media(min-width: 768px) { .rooms-grid { grid-template-columns:repeat(3, 1fr); } }

        .btn-gold { background:var(--gold); color:var(--dark); padding:1rem 2rem; text-decoration:none; font-weight:600; display:inline-block; margin-top:2rem; text-transform:uppercase; font-size:0.8rem; }

        /* REVEAL ON SCROLL */
        .reveal { opacity:0; transform:translateY(30px); transition:1s all ease; }
        .reveal.visible { opacity:1; transform:translateY(0); }
    </style>
</head>
<body>

    <nav id="nav">
        <div class="brand">Kayriott</div>
        <button class="btn-gold" style="margin:0; padding:0.5rem 1rem;">Book</button>
    </nav>

    <section id="hero">
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="hero.mp4" type="video/mp4">
        </video>
        <!-- The building movement layers -->
        <div class="hero-slide active" style="background-image:url('hero-building.webp')"></div>
        <div class="hero-slide" style="background-image:url('hero-side.webp')"></div>
        
        <div class="hero-content">
            <h1 class="h-title">Where Comfort Meets<br><em>Refined Hospitality</em></h1>
            <p style="margin-top:1rem; color:rgba(255,255,255,0.7);">Km 3 Refinery Road, Effurun-Warri</p>
            <a href="#rooms" class="btn-gold">View Our Rooms</a>
        </div>
    </section>

    <section class="sec reveal grid-2">
        <div>
            <h2 class="h-title" style="font-size:2.5rem;">Luxury <em>Poolside</em></h2>
            <p style="margin-top:1.5rem; color:var(--muted); line-height:1.8;">Experience our dual pool complex, featuring a full-service bar and relaxation zones designed for the ultimate escape.</p>
        </div>
        <div style="background:url('pool-main.webp') center/cover; min-height:300px; border:10px solid var(--dark);"></div>
    </section>

    <section id="rooms" class="sec reveal" style="background:#111;">
        <h2 class="h-title" style="font-size:2.5rem; margin-bottom:2rem;">Our <em>Suites</em></h2>
        <div class="rooms-grid">
            <div style="height:300px; background:url('hero-building.webp') center/cover;"><div style="padding:1rem; background:rgba(0,0,0,0.5); height:100%; display:flex; align-items:flex-end;">Presidential Suite</div></div>
            <div style="height:300px; background:url('hero-side.webp') center/cover;"><div style="padding:1rem; background:rgba(0,0,0,0.5); height:100%; display:flex; align-items:flex-end;">Executive Room</div></div>
            <div style="height:300px; background:url('pool-night.webp') center/cover;"><div style="padding:1rem; background:rgba(0,0,0,0.5); height:100%; display:flex; align-items:flex-end;">Standard Room</div></div>
        </div>
    </section>

    <script>
        // Hero Movement Logic
        const slides = document.querySelectorAll('.hero-slide');
        let current = 0;
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 5000);

        // Scroll & Reveal
        window.addEventListener('scroll', () => {
            document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
        });

        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
        });
        document.querySelectorAll('.reveal').forEach(r => obs.observe(r));
    </script>
</body>
</html>
