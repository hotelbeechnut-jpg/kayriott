<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Image Test</title>
<style>
  body { background:#111; color:#fff; font-family:sans-serif; padding:20px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
  .card { background:#222; border-radius:8px; padding:8px; text-align:center; }
  .card img { width:100%; height:160px; object-fit:cover; border-radius:4px; display:block; }
  .card .name { margin-top:6px; font-size:12px; color:#999; }
  .pass { background:#1a3a1a; } .fail { background:#3a1a1a; }
</style></head>
<body>
<h2>Image Diagnostics</h2>
<div class="grid" id="grid"></div>
<script>
  const images = [
    'restaurant.webp','bar-lounge.webp','breakfast-area.webp',
    'hotel-entrance.webp','night-view.webp',
    'hero-building.webp','lobby-view.webp','pool-main.webp','pool-night.webp',
    'room-presidential.webp','room-executive.webp','room-standard.webp'
  ];
  const grid = document.getElementById('grid');
  images.forEach(src => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<img src="${src}" onload="this.parentElement.classList.add('pass')" onerror="this.parentElement.classList.add('fail')" alt="${src}"><div class="name">${src}</div>`;
    grid.appendChild(card);
  });
</script>
</body>
</html>
